<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internship Task Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>

<div class="container">
    <header>
        <h1><i class="fas fa-tasks"></i> Internship Task Tracker</h1>
        <p>Kelola tugas dengan prioritas</p>
    </header>

    <main>
        <section class="task-input-section">
            <form id="task-form">
                <input type="text" id="task-input" placeholder="Apa tugas baru?" required>
                <input type="text" id="assignee-input" placeholder="Siapa yang mengerjakan?">
                <input type="date" id="due-date-input" required>

                <!-- DROPDOWN PRIORITAS -->
                <select id="priority-input" required>
                    <option value="">Pilih Prioritas</option>
                    <option value="Tinggi">Tinggi</option>
                    <option value="Sedang">Sedang</option>
                    <option value="Rendah">Rendah</option>
                </select>

                <button type="submit"><i class="fas fa-plus"></i> Tambah</button>
            </form>
        </section>

        <section class="task-list-section">
            <h2>Daftar Tugas</h2>
            <span id="task-count"></span>
            <ul id="task-list"></ul>
        </section>
    </main>
</div>

<script src="script.js"></script>
</body>
</html>
